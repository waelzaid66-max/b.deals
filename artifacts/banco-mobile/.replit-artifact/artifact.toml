kind = "mobile"
previewPath = "/banco-mobile/"
title = "BANCO Mobile"
version = "1.0.0"
id = "artifacts/banco-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/banco-mobile/" ]
localPort = 23351

[services.development]
run = "pnpm --filter @workspace/banco-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/banco-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/banco-mobile", "run", "serve" ]

[services.env]
PORT = "23351"
BASE_PATH = "/banco-mobile/"
